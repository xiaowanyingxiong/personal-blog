<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#a5b4fc;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bgGrad)" rx="20"/>

  <!-- Decorative circles -->
  <circle cx="450" cy="50" r="80" fill="#6366f1" opacity="0.06"/>
  <circle cx="50" cy="300" r="100" fill="#818cf8" opacity="0.08"/>
  <circle cx="400" cy="280" r="60" fill="#a5b4fc" opacity="0.1"/>

  <!-- Main Code Editor Card -->
  <g filter="url(#shadow)">
    <rect x="60" y="40" width="280" height="200" rx="16" fill="white"/>

    <!-- Editor header -->
    <rect x="60" y="40" width="280" height="40" rx="16" fill="#f8fafc"/>
    <rect x="60" y="60" width="280" height="20" fill="#f8fafc"/>

    <!-- Window buttons -->
    <circle cx="85" cy="60" r="8" fill="#ef4444"/>
    <circle cx="110" cy="60" r="8" fill="#fbbf24"/>
    <circle cx="135" cy="60" r="8" fill="#22c55e"/>

    <!-- Code lines -->
    <rect x="85" y="95" width="60" height="8" rx="4" fill="url(#cardGrad)" opacity="0.4"/>
    <rect x="85" y="115" width="220" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="100" y="135" width="180" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="100" y="155" width="140" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="85" y="175" width="80" height="8" rx="4" fill="url(#cardGrad)" opacity="0.4"/>
    <rect x="100" y="195" width="200" height="8" rx="4" fill="#e2e8f0"/>

    <!-- Cursor blink -->
    <rect x="85" y="115" width="2" height="12" fill="#6366f1">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Secondary Card - Terminal -->
  <g filter="url(#shadow)">
    <rect x="180" y="140" width="260" height="180" rx="16" fill="#1e1e2e"/>

    <!-- Terminal header -->
    <rect x="180" y="140" width="260" height="36" rx="16" fill="#2a2a3e"/>
    <rect x="180" y="160" width="260" height="16" fill="#2a2a3e"/>

    <!-- Terminal buttons -->
    <circle cx="205" cy="158" r="6" fill="#ef4444"/>
    <circle cx="225" cy="158" r="6" fill="#fbbf24"/>
    <circle cx="245" cy="158" r="6" fill="#22c55e"/>

    <!-- Terminal prompt -->
    <text x="200" y="210" font-family="monospace" font-size="12" fill="#22c55e">$ npm run dev</text>
    <text x="200" y="230" font-family="monospace" font-size="12" fill="#a5b4fc">▶ Vite ready</text>
    <text x="200" y="250" font-family="monospace" font-size="12" fill="#c4b5fd">➜ Local: http://localhost:5173</text>
    <text x="200" y="270" font-family="monospace" font-size="12" fill="#22c55e">✓ 64ms</text>
    <text x="200" y="290" font-family="monospace" font-size="12" fill="#fbbf24">⚡ Ready in 286ms</text>
  </g>

  <!-- Floating Elements -->
  <!-- Vue logo approximation -->
  <g transform="translate(380, 30)">
    <circle r="28" fill="url(#accentGrad)" opacity="0.9"/>
    <text x="0" y="8" font-family="Arial" font-size="24" font-weight="bold" fill="white" text-anchor="middle">V</text>
  </g>

  <!-- TypeScript logo approximation -->
  <g transform="translate(420, 90)">
    <circle r="24" fill="#3178c6" opacity="0.9"/>
    <text x="0" y="7" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">TS</text>
  </g>

  <!-- Git branch icon -->
  <g transform="translate(55, 260)">
    <circle r="20" fill="url(#cardGrad)" opacity="0.8"/>
    <path d="M-8,-5 L0,-5 L0,5 L8,5 M0,-5 L0,-10 M0,5 L0,10 M0,-5 C10,-5 10,5 0,5" stroke="white" stroke-width="2" fill="none" transform="scale(0.9)"/>
  </g>

  <!-- Code brackets decoration -->
  <text x="300" y="340" font-family="monospace" font-size="60" font-weight="bold" fill="#6366f1" opacity="0.08">{ }</text>
</svg>
